set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g focus-events on
set -g status-interval 1
set -g escape-time 0
set -g repeat-time 500
set -g display-time 1500
set -g mode-keys vi
set -g status-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g mouse on
set -g set-clipboard on

set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

setw -g monitor-activity on
set -g visual-activity off     

unbind C-b
set -g prefix C-z
bind C-z send-prefix

bind-key -n C-Left  previous-window
bind-key -n C-Right next-window

bind -n S-Left  previous-window
bind -n S-Right next-window

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r m resize-pane -Z

bind Escape copy-mode
bind p paste-buffer

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

bind r source-file ~/.tmux.conf \; display-message " tmux.conf reloaded"

bind x kill-pane
bind W kill-window

bind b set-option status

bind Space last-window
bind L switch-client -l

bind f display-popup -E -w 70% -h 70% "dir=\$(find ~/ ~/projects ~/dotfiles -mindepth 1 -maxdepth 1 -type d 2>/dev/null | fzf --reverse) && [ -n \"\$dir\" ] && name=\$(basename \"\$dir\" | tr . _) && tmux new-session -d -s \"\$name\" -c \"\$dir\" 2>/dev/null; tmux switch-client -t \"\$name\""

bind j choose-window 'join-pane -h -s "%%"'
bind J choose-window 'join-pane -t "%%"'

bind C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

bind s display-popup -E -w 70% -h 70% "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

bind S set-window-option synchronize-panes \; display-message "synchronize-panes: #{?synchronize-panes,ON,OFF}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @yank_selection_mouse 'clipboard'

set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

run '~/.tmux/plugins/tpm/tpm'

set -g status-position top
set -g status-justify left
set -g status-left-length  100
set -g status-right-length 100

set -g status-style bg=default

set -g status-left "#{?client_prefix,#[fg=#{@thm_red}bold] \uebc8 #S ,#[fg=#{@thm_green}bold] \uebc8 #S }#[fg=#{@thm_overlay_0}nobold]| "

set -g status-right "#{?SSH_CLIENT,#[fg=#{@thm_red}]\uf489 SSH #[fg=#{@thm_overlay_0}]| ,}#[fg=#{@thm_blue}] \uf07b #{b:pane_current_path} #[fg=#{@thm_overlay_0}]|#[fg=#{@thm_overlay_0}] \uf017 %H:%M "

set -gF window-status-separator      "#[fg=#{@thm_overlay_0}] "
set -g  window-status-format         "#[fg=#{@thm_overlay_0}] #I #[fg=#{@thm_rosewater}]#W "
set -g  window-status-style          "bg=default"
set -g  window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_peach},bold] #I #W#{?window_zoomed_flag, \uf00e ,} "

set -g  window-status-activity-style "fg=#{@thm_yellow},bg=default,italics"

setw -g pane-active-border-style "bg=default,fg=#{@thm_peach}"
setw -g pane-border-style        "bg=default,fg=#{@thm_overlay_0}"
setw -g pane-border-lines        single
