# ==============================================================================
# Core Options
# ==============================================================================
# Enforce True Color (Tc) and RGB support for Kitty/Wayland
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g focus-events on
set -g status-interval 1
set -g escape-time 0           # Eliminate Esc lag in Neovim
set -g repeat-time 500
set -g display-time 1500
set -g mode-keys vi
set -g status-keys vi
set -g base-index 1            # Start windows at 1
setw -g pane-base-index 1      # Start panes at 1
set -g renumber-windows on     # Re-index windows when one is closed
set -g detach-on-destroy off   # Don't exit tmux when closing a session
set -g mouse on
set -g set-clipboard on        # Let kitty/wayland handle clipboard requests natively

# Dynamic Window Naming (Name window after current directory)
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off     

# ==============================================================================
# Prefix
# ==============================================================================
unbind C-b
set -g prefix C-z
bind C-z send-prefix

# ==============================================================================
# Key Bindings — Navigation (Integrated with vim-tmux-navigator)
# ==============================================================================
# We let vim-tmux-navigator handle h,j,k,l. We just add quick window switching.
bind-key -n C-Left  previous-window
bind-key -n C-Right next-window

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# ==============================================================================
# Key Bindings — Splits & Windows
# ==============================================================================
# Intuitive split commands that preserve the current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# ==============================================================================
# Key Bindings — Resize Panes (Repeatable)
# ==============================================================================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Maximize current pane (Toggle)
bind -r m resize-pane -Z

# ==============================================================================
# Key Bindings — Copy Mode (vi)
# ==============================================================================
bind Escape copy-mode
bind p paste-buffer

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# ==============================================================================
# Key Bindings — Session & Window Management
# ==============================================================================
# Fast reload
bind r source-file ~/.tmux.conf \; display-message " tmux.conf reloaded"

# Kill panes without confirmation
bind x kill-pane
bind W kill-window

# Floating Session Switcher (Way cleaner than full screen)
bind s display-popup -E -w 70% -h 70% "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# Toggle synchronized input
bind S set-window-option synchronize-panes \; display-message "synchronize-panes: #{?synchronize-panes,ON,OFF}"

# ==============================================================================
# Plugins
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# ==============================================================================
# Plugin Configuration
# ==============================================================================
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @yank_selection_mouse 'clipboard'

# Catppuccin Base Setup
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# ==============================================================================
# Status Bar (Must be after TPM run)
# ==============================================================================
set -g status-position top
set -g status-justify left       # Left justify feels cleaner when windows are named by directory
set -g status-left-length  100
set -g status-right-length 100

# Transparent background for the status bar
set -g status-style bg=default

# Left: Session name + Prefix Highlight
# Turns Red if prefix is active, Green if normal
set -g status-left "#{?client_prefix,#[fg=#{@thm_red}bold] \uebc8 #S ,#[fg=#{@thm_green}bold] \uebc8 #S }#[fg=#{@thm_overlay_0}nobold]| "

# Right: Directory · Time
set -g status-right "#[fg=#{@thm_blue}] \uf07b #{b:pane_current_path} #[fg=#{@thm_overlay_0}]|#[fg=#{@thm_overlay_0}] \uf017 %H:%M "

# Window list formatting
set -gF window-status-separator      "#[fg=#{@thm_overlay_0}] "
set -g  window-status-format         "#[fg=#{@thm_overlay_0}] #I #[fg=#{@thm_rosewater}]#W "
set -g  window-status-style          "bg=default"
set -g  window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_peach},bold] #I #W "

# Activity flash
set -g  window-status-activity-style "fg=#{@thm_yellow},bg=default,italics"

# ==============================================================================
# Pane Borders
# ==============================================================================
setw -g pane-active-border-style "bg=default,fg=#{@thm_peach}"
setw -g pane-border-style        "bg=default,fg=#{@thm_overlay_0}"
setw -g pane-border-lines        single
