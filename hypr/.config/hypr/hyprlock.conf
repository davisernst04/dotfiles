$font = JetBrainsMono Nerd Font

# GENERAL
general {
  disable_loading_bar = true
  hide_cursor = true
  ignore_empty_input = true
  immediate_render = false
  text_trim = true
  fractional_scaling = 2
  screencopy_mode = 0
  fail_timeout = 2000
}

# BACKGROUND
background {
  path = screenshot
  blur_passes = 2
  color = $base
}

auth {
  pam {
    enabled = true
    module = hyprlock
  }
  fingerprint {
    enabled = true
  }
}

animations {
  enabled = false
}

# TIME
label {
  monitor =
  text = $TIME12
  color = rgb(89b4fa)
  font_size = 90
  font_family = $font
  position = 0, 150
  halign = center
  valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%B %d, %Y"
  color = rgb(89b4fa)
  font_size = 25
  font_family = $font
  position = 0, 50
  halign = center
  valign = center
}



# INPUT FIELD
input-field {
  monitor =
  size = 300, 60
  outline_thickness = 3
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgb(89b4fa)
  inner_color = rgb(1e1e2e)
  font_color = rgb(89b4fa)
  fade_on_empty = false
  placeholder_text = 
  hide_input = false
  check_color = $accent
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -47
  halign = center
  valign = center
}
