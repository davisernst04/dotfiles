source = ~/.config/hypr/application-style.conf

#################
### AUTOSTART ###
#################
exec-once = systemctl --user start hyprpolkitagent
exec-once = hypridle
exec-once = hyprpaper
exec-once = hyprctl setcursor
exec-once = [workspace 1 silent] kitty

################
### MONITORS ###
################
monitor = eDP-1, 1920x1080@60, 0x0, 1.5
monitor = HDMI-A-2, 1920x1080@60, 0x-864, 1.25

##################
### WORKSPACES ###
##################
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:HDMI-A-2
workspace = 7, monitor:HDMI-A-2
workspace = 8, monitor:HDMI-A-2
workspace = 9, monitor:HDMI-A-2
workspace = 10, monitor:HDMI-A-2

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32
env = GDK_SCALE,2
env = AQ_NO_MODIFIERS,1

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun
$powermenu = zsh ~/.config/rofi/powermenu.sh
$screenshot = hyprshot -m output -m active -o ~/Pictures/Screenshots/
$hyprlock = hyprlock
$bar = zsh ~/.config/waybar/waybar.sh
$browser = firefox
$mainMod = SUPER

#####################
### LOOK & FEEL ###
#####################
general {
    gaps_in = 1
    gaps_out = 1
    border_size = 1
    col.active_border = rgba(89b4faff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(00000000)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 2
    active_opacity = 1
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 5
        render_power = 3
        color = rgba(89b4faff)
        color_inactive = rgba(00000000)
    }

    blur {
        enabled = false
        size = 1
        passes = 5
        vibrancy = 0.1696
    }
}

animations {
    enabled = no 
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.5, 0, 0.99, 0.99
    bezier = smoothIn, 0.5, -0.5, 0.68, 1.5
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1
    
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 5, winIn, slide
    animation = windowsOut, 1, 3, smoothOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 180, liner, loop
    animation = fade, 1, 3, smoothOut
    animation = workspaces, 1, 5, overshot
    animation = workspacesIn, 1, 5, winIn, slide
    animation = workspacesOut, 1, 5, winOut, slide
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, popin 50%
    animation = layersOut, 1, 3, easeOutQuint, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    middle_click_paste = false
    vfr = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = grp:ctrl_space_toggle
    kb_rules =
    accel_profile = flat
    follow_mouse = 1
    sensitivity = 0.8
    touchpad {
        natural_scroll = true
    }
    repeat_delay = 150
    repeat_rate = 50
}

###################
### KEYBINDINGS ###
###################
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

bind = $mainMod ALT, K, focusmonitor, u
bind = $mainMod ALT, J, focusmonitor, d

binde = $mainMod SHIFT, Right, resizeactive, 10 0
binde = $mainMod SHIFT, Left, resizeactive, -10 0
binde = $mainMod SHIFT, Up, resizeactive, 0 -10
binde = $mainMod SHIFT, Down, resizeactive, 0 10

bind = $mainMod, O, exec, $screenshot
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit
bind = $mainMod, T, fullscreen
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, T, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, Z, exec, $powermenu
bind = $mainMod, S, togglesplit,
bind = $mainMod, X, exec, $hyprlock
bind = $mainMod, P, exec, $bar

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $mainMod, F3, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = $mainMod, F1, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = $mainMod, F4, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = $mainMod, F5, exec, brightnessctl set 10%-
bind = $mainMod, F6, exec, brightnessctl set +10%
bind = $mainMod, F11, exec, brightnessctl -d *::kbd_backlight set +33%
bind = $mainMod, F10, exec, brightnessctl -d *::kbd_backlight set 33%-

bindl = , switch:Lid Switch, exec, hyprlock
